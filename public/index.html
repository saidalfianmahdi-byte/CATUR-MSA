<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSA CHESS ONLINE</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; height: 100vh; background-color: #161512; color: #fff; overflow: hidden; flex-direction: row; }
        
        #sidebar { width: 320px; background-color: #262522; display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #312e2b; justify-content: space-between; z-index: 5; flex-shrink: 0; }
        .sidebar-logo-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #312e2b; }
        .sidebar-logo-wrapper { width: 80px; height: 80px; background-color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; padding: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 10px; }
        .sidebar-logo-img { width: 100%; height: 100%; object-fit: contain; }
        .sidebar-logo-area h1 { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
        
        .online-counter { font-size: 11px; color: #81b64c; background-color: rgba(129,182,76,0.1); padding: 4px 10px; border-radius: 20px; margin-top: 5px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
        .online-dot { width: 6px; height: 6px; background-color: #81b64c; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #bababa; font-size: 13px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background-color: #312e2b; border: 1px solid #45423e; border-radius: 4px; color: #fff; font-size: 15px; }
        
        .btn { width: 100%; padding: 12px; background-color: #81b64c; border: none; border-radius: 4px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 0 #67923d; }
        .btn:hover { background-color: #95cc5a; }
        .btn.danger { width: 100%; padding: 12px; background-color: #f44336; border: none; border-radius: 4px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #b71c1c; }
        .btn.danger:hover { background-color: #e57373; }
        .btn.secondary { background-color: #45423e; box-shadow: 0 4px 0 #312e2b; margin-top: 10px;}
        
        .media-controls { background: #312e2b; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #45423e;}
        .control-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600;}
        .toggle-btn { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; color: #fff; min-width: 60px; text-align: center;}
        .toggle-btn.on { background-color: #81b64c; }
        .toggle-btn.off { background-color: #f44336; }

        .player-card { background-color: #312e2b; padding: 12px 15px; border-radius: 5px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px; border-left: 4px solid #45423e; font-weight: 600; font-size: 14px; }
        .player-card.active { border-left-color: #81b64c; background-color: #3a3733; }
        
        #mainContent { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; background-color: #161512; overflow-y: auto; }
        #lobbyScreen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #22211e 0%, #161512 100%); z-index: 10; text-align: center; padding: 30px; }
        .lobby-card { background-color: #262522; padding: 40px 30px; border-radius: 12px; border: 1px solid #312e2b; box-shadow: 0 20px 40px rgba(0,0,0,0.6); max-width: 440px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .lobby-title { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #fff; margin-bottom: 8px; }
        .lobby-subtitle { font-size: 13px; color: #81b64c; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
        .lobby-desc { color: #bababa; font-weight: 400; font-size: 14px; line-height: 1.5; border-top: 1px solid #312e2b; padding-top: 15px; }

        #waitingScreen { display: none; position: absolute; width: 100%; height: 100%; background: #161512; z-index: 9; flex-direction: column; justify-content: center; align-items: center; }
        .waiting-box { background: #262522; padding: 40px; border-radius: 12px; border: 1px solid #312e2b; box-shadow: 0 15px 35px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }
        .spinner { width: 50px; height: 50px; border: 5px solid #312e2b; border-top: 5px solid #81b64c; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #gameScreen { display: none; width: 100%; justify-content: center; align-items: center; gap: 25px; }
        #chessboard-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 560px; }
        
        /* DESAIN BARU PANEL BIDAK MATI */
        .captured-panel { display: flex; width: 100%; align-items: center; justify-content: flex-start; gap: 10px; padding: 6px 4px; min-height: 36px; box-sizing: border-box; }
        .captured-box { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; }
        .dead-piece { width: 22px; height: 22px; object-fit: contain; opacity: 0.75; }
        .score-badge { color: #81b64c; font-size: 11px; font-weight: 800; background: rgba(129,182,76,0.18); padding: 1px 5px; border-radius: 4px; font-family: monospace; margin-left: 4px; }
        
        #chessboard { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1 / 1; border-radius: 4px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.7); }
        
        .square { display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; user-select: none; }
        .theme-classic .white-sq { background-color: #eeeed2; }
        .theme-classic .black-sq { background-color: #769656; }
        .theme-blue .white-sq { background-color: #ebecf0; }
        .theme-blue .black-sq { background-color: #4b7399; }
        .theme-wood .white-sq { background-color: #dcb35c; }
        .theme-wood .black-sq { background-color: #8d5b4c; }
        .theme-charcoal .white-sq { background-color: #e3e3e3; }
        .theme-charcoal .black-sq { background-color: #707070; }
        
        .square.selected { background-color: rgba(247, 247, 105, 0.4) !important; }
        .square.highlight::after { content: ''; position: absolute; width: 24%; height: 24%; background-color: rgba(0, 0, 0, 0.15); border-radius: 50%; pointer-events: none; }
        .square.highlight.has-piece::after { width: 80%; height: 80%; background: none; border: 5px solid rgba(0, 0, 0, 0.12); border-radius: 50%; }
        
        .piece { width: 92%; height: 92%; object-fit: contain; z-index: 2; filter: none !important; color-scheme: light !important; }
        
        #chatContainer { width: 300px; height: 560px; background-color: #262522; border-radius: 6px; display: flex; flex-direction: column; border: 1px solid #312e2b; flex-shrink: 0; }
        .chat-header { padding: 12px; background-color: #312e2b; border-bottom: 1px solid #3d3a35; font-weight: bold; font-size: 13px; color: #bababa; }
        #chatMessages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .msg { padding: 8px 12px; border-radius: 6px; max-width: 85%; word-break: break-word; }
        .msg.system { background-color: rgba(129,182,76,0.15); color: #81b64c; align-self: center; text-align: center; font-size: 11px; width: 100%; }
        .msg.me { background-color: #81b64c; color: #fff; align-self: flex-end; }
        .msg.opp { background-color: #312e2b; color: #fff; align-self: flex-start; border: 1px solid #45423e; }
        .chat-input-area { padding: 8px; border-top: 1px solid #312e2b; display: flex; gap: 6px; background-color: #1e1d1b; }
        .chat-input-area input { flex: 1; padding: 8px 12px; background-color: #262522; border: 1px solid #45423e; border-radius: 4px; color: #fff; font-size: 13px; }
        .chat-input-area button { padding: 0 14px; background-color: #312e2b; border: 1px solid #45423e; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; }

        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background-color: #262522; padding: 30px; border-radius: 8px; text-align: center; border: 1px solid #45423e; max-width: 400px; width: 90%; }
        .modal-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #81b64c; }
        .modal-desc { color: #bababa; margin-bottom: 20px; font-size: 15px; }
        .modal-btn-group { display: flex; gap: 10px; justify-content: center; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            #sidebar { width: 100%; border-right: none; border-bottom: 1px solid #312e2b; padding: 15px; }
            #mainContent { padding: 10px; min-height: calc(100vh - 120px); }
            #gameScreen { flex-direction: column; gap: 15px; width: 100%; padding-bottom: 30px; }
            #chessboard-container { width: 100%; max-width: 100%; }
            #chatContainer { width: 100%; height: 320px; }
            .sidebar-logo-area { flex-direction: row; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; }
            .sidebar-logo-wrapper { width: 45px; height: 45px; margin-bottom: 0; }
            .sidebar-logo-area h1 { font-size: 16px; margin-left: 10px; flex-grow: 1; text-align: left; }
        }
    </style>
</head>
<body>

    <audio id="remoteAudio" autoplay></audio>

    <div id="sidebar">
        <div class="top-side">
            <div class="sidebar-logo-area">
                <div class="sidebar-logo-wrapper">
                    <img src="MSA.jpeg" alt="MSA Logo" class="sidebar-logo-img" onerror="this.style.display='none'">
                </div>
                <h1>MSA CATUR</h1>
                <div class="online-counter">
                    <span class="online-dot"></span> <span id="onlineCount">1</span> Online
                </div>
            </div>
            
            <div class="form-group">
                <label for="boardTheme">Gaya Papan</label>
                <select id="boardTheme" onchange="changeTheme()">
                    <option value="theme-classic">Classic Green</option>
                    <option value="theme-blue" selected>Ocean Blue</option>
                    <option value="theme-wood">Burnt Wood</option>
                    <option value="theme-charcoal">Charcoal Grey</option>
                </select>
            </div>
            
            <div id="inGameInfo" style="display: none;">
                <div class="media-controls">
                    <div class="control-row">
                        <span>🔊 Speaker (Dengar)</span>
                        <button id="speakerBtn" class="toggle-btn on" onclick="toggleSpeaker()">ON</button>
                    </div>
                    <div class="control-row">
                        <span>🎙️ Mikrofon (Kirim)</span>
                        <button id="micBtn" class="toggle-btn off" onclick="toggleMic()">OFF</button>
                    </div>
                </div>

                <div class="player-card" id="oppCard">
                    <span id="oppNameDisplay">Mengecek lawan...</span>
                </div>
                <div class="player-card" id="myCard">
                    <span id="myNameDisplay">👤 Anda</span>
                </div>
            </div>
        </div>

        <div class="bottom-side">
            <div id="lobbyForm">
                <div class="form-group">
                    <label for="username">Nama Pemain</label>
                    <input type="text" id="username" placeholder="Nama Anda..." autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="roomName">Nama Kamar (Room)</label>
                    <input type="text" id="roomName" placeholder="Nama Room..." autocomplete="off">
                </div>
                <button class="btn" onclick="joinRoom()">Masuk Game</button>
            </div>
            <div id="leaveArea" style="display: none;">
                <button class="btn danger" onclick="askToLeave()">Keluar Game</button>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <div class="modal-overlay" id="systemModal">
            <div class="modal-content">
                <div class="modal-title" id="modalTitle">INFORMASI</div>
                <div class="modal-desc" id="modalDesc">-</div>
                <div class="modal-btn-group" id="modalButtons"></div>
            </div>
        </div>

        <div id="lobbyScreen">
            <div class="lobby-card">
                <h2 class="lobby-title">MSA CATUR ONLINE</h2>
                <p class="lobby-subtitle">Voice Chat & realtime</p>
                <p class="lobby-desc">Ketik Nama Pemain & Nama Kamar di kolom kiri untuk masuk arena bertanding.</p>
            </div>
        </div>

        <div id="waitingScreen">
            <div class="waiting-box">
                <div class="spinner"></div>
                <h3 style="margin-bottom: 10px;">Menunggu Lawan...</h3>
                <p style="color: #bababa; font-size: 14px;">Kamar: <strong id="waitingRoomName" style="color: #81b64c;">-</strong></p>
            </div>
        </div>

        <div id="gameScreen">
            <div id="chessboard-container">
                <!-- PANEL ATAS: Tempat bidak PUTIH yang dimakan oleh HITAM -->
                <div class="captured-panel">
                    <div class="captured-box" id="captured-white-box"></div>
                </div>

                <div id="chessboard" class="theme-blue"></div>

                <!-- PANEL BAWAH: Tempat bidak HITAM yang dimakan oleh PUTIH -->
                <div class="captured-panel">
                    <div class="captured-box" id="captured-black-box"></div>
                </div>
            </div>

            <div id="chatContainer">
                <div class="chat-header">Obrolan Kamar</div>
                <div id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="btn-input" placeholder="Ketik pesan..." onkeypress="if(event.keyCode==13) sendMessage()">
                    <button onclick="sendMessage()">Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let chess = null;
        let myColor = null; 
        let myUsername = '';
        let currentRoom = '';
        let selectedSquare = null;
        let possibleMoves = [];
        let gameStarted = false;

        let localStream = null;
        let peerConnection = null;
        let isSpeakerOn = true; 
        let isMicOn = false;

        let isMakingOffer = false;
        let isSettingRemoteAnswerPending = false;
        
        const isPolite = () => myColor === 'b'; 

        const rtcConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };

        const soundMove = new Audio('https://raw.githubusercontent.com/ornicar/lila/master/public/sound/standard/Move.ogg');
        const soundCapture = new Audio('https://raw.githubusercontent.com/ornicar/lila/master/public/sound/standard/Capture.ogg');
        const soundStart = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav'); 

        // VARIABEL STATE KALKULASI BIDAK MATI
        const PIECE_VALUES = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
        const INITIAL_PIECES = {
            w: ['p','p','p','p','p','p','p','p', 'n','n', 'b','b', 'r','r', 'q'],
            b: ['p','p','p','p','p','p','p','p', 'n','n', 'b','b', 'r','r', 'q']
        };

        function unlockAudioContext() {
            [soundMove, soundCapture, soundStart].forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });
            document.removeEventListener('click', unlockAudioContext);
            document.removeEventListener('touchstart', unlockAudioContext);
        }
        document.addEventListener('click', unlockAudioContext);
        document.addEventListener('touchstart', unlockAudioContext);

        function changeTheme() {
            const select = document.getElementById('boardTheme');
            const board = document.getElementById('chessboard');
            if (board) board.className = select.value;
        }

        async function joinRoom() {
            myUsername = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('roomName').value.trim();
            if (!myUsername || !currentRoom) return alert("Lengkapi data nama dan kamar!");

            try { chess = new Chess(); } catch (e) { console.error(e); }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
                    video: false 
                });
                localStream.getAudioTracks().forEach(track => { track.enabled = isMicOn; });
            } catch (err) {
                console.error("Gagal inisialisasi mic:", err);
                alert("Gagal terhubung ke mic perangkat. Pastikan izin browser diberikan.");
            }

            socket.emit('joinRoom', { username: myUsername, room: currentRoom });
            
            document.getElementById('lobbyScreen').style.display = 'none';
            document.getElementById('waitingRoomName').innerText = currentRoom;
            document.getElementById('waitingScreen').style.display = 'flex'; 
            document.getElementById('lobbyForm').style.display = 'none';
            document.getElementById('inGameInfo').style.display = 'block';
            document.getElementById('leaveArea').style.display = 'block';
            document.getElementById('myNameDisplay').innerText = `👤 ${myUsername} (Anda)`;
            
            renderBoard();
            changeTheme();
            // Reset UI bidak mati di awal masuk
            checkDeadPieces(); 
        }

        async function initPeerConnection() {
            if (peerConnection) return;
            
            peerConnection = new RTCPeerConnection(rtcConfig);
            
            peerConnection.onnegotiationneeded = async () => {
                try {
                    isMakingOffer = true;
                    const offer = await peerConnection.createOffer({ offerToReceiveAudio: true });
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('webrtc-offer', { room: currentRoom, offer: offer });
                } catch (err) {
                    console.error("Gagal pada penawaran otomatis:", err);
                } finally {
                    isMakingOffer = false;
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-candidate', { room: currentRoom, candidate: event.candidate });
                }
            };
            
            peerConnection.ontrack = (event) => {
                const remoteAudio = document.getElementById('remoteAudio');
                if (remoteAudio && event.streams && event.streams[0]) {
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.muted = !isSpeakerOn; 
                    remoteAudio.play().catch(e => console.log("Gagal memutar audio:", e));
                }
            };

            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
        }

        function toggleSpeaker() {
            const btn = document.getElementById('speakerBtn');
            const remoteAudio = document.getElementById('remoteAudio');
            isSpeakerOn = !isSpeakerOn;
            
            if (isSpeakerOn) {
                btn.innerText = "ON"; btn.className = "toggle-btn on";
                if (remoteAudio) { remoteAudio.muted = false; remoteAudio.play().catch(() => {}); }
            } else {
                btn.innerText = "OFF"; btn.className = "toggle-btn off";
                if (remoteAudio) { remoteAudio.muted = true; }
            }
        }

        function toggleMic() {
            const btn = document.getElementById('micBtn');
            isMicOn = !isMicOn;
            
            if (localStream && localStream.getAudioTracks().length > 0) {
                localStream.getAudioTracks()[0].enabled = isMicOn;
                if (isMicOn) { btn.innerText = "ON"; btn.className = "toggle-btn on"; }
                else { btn.innerText = "OFF"; btn.className = "toggle-btn off"; }
            } else {
                alert("Perangkat mikrofon belum siap.");
                isMicOn = false;
            }
        }

        function openModal(title, desc, buttonsHTML) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalButtons').innerHTML = buttonsHTML;
            document.getElementById('systemModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('systemModal').style.display = 'none'; }
        function askToLeave() {
            openModal("Keluar Game?", "Koneksi ke ruangan catur akan terputus.", 
                `<button class="btn danger" onclick="confirmLeave()">Ya</button><button class="btn secondary" onclick="closeModal()">Batal</button>`);
        }
        function confirmLeave() { window.location.reload(); }

        function renderBoard() {
            const boardElement = document.getElementById('chessboard');
            if (!boardElement) return;
            boardElement.innerHTML = '';

            let turn = 'w';
            if (chess) turn = chess.turn();

            if (myColor) {
                if (turn === myColor) {
                    document.getElementById('myCard').classList.add('active');
                    document.getElementById('oppCard').classList.remove('active');
                } else {
                    document.getElementById('oppCard').classList.add('active');
                    document.getElementById('myCard').classList.remove('active');
                }
            }

            const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            for (let i = 0; i < 8; i++) {
                const r = myColor === 'b' ? i : 7 - i; 
                for (let j = 0; j < 8; j++) {
                    const f = myColor === 'b' ? 7 - j : j;
                    const squareName = files[f] + (r + 1);

                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((i + j) % 2 === 0 ? 'white-sq' : 'black-sq');
                    square.dataset.square = squareName;

                    if (selectedSquare === squareName) square.classList.add('selected');
                    if (possibleMoves.includes(squareName)) {
                        square.classList.add('highlight');
                        if (chess && chess.get(squareName)) square.classList.add('has-piece');
                    }

                    if (chess) {
                        const piece = chess.get(squareName);
                        if (piece) {
                            const img = document.createElement('img');
                            img.classList.add('piece');
                            img.src = `https://upload.wikimedia.org/wikipedia/commons/${getPieceImageName(piece.color, piece.type)}`;
                            square.appendChild(img);
                        }
                    }
                    square.onclick = () => handleSquareClick(squareName);
                    boardElement.appendChild(square);
                }
            }
        }

        function getPieceImageName(color, type) {
            const key = color + type;
            const map = {
                'wp': '4/45/Chess_plt45.svg', 'wn': '7/70/Chess_nlt45.svg', 'wb': 'b/b1/Chess_blt45.svg', 'wr': '7/72/Chess_rlt45.svg', 'wq': '1/15/Chess_qlt45.svg', 'wk': '4/42/Chess_klt45.svg',
                'bp': 'c/c7/Chess_pdt45.svg', 'bn': 'e/ef/Chess_ndt45.svg', 'bb': '9/98/Chess_bdt45.svg', 'br': 'f/ff/Chess_rdt45.svg', 'bq': '4/47/Chess_qdt45.svg', 'bk': 'f/f0/Chess_kdt45.svg'
            };
            return map[key] || '';
        }

        // FUNGSI BARU UNTUK KALKULASI & RENDER BIDAK MATI
        function checkDeadPieces() {
            if (!chess) return;

            let activePieces = { w: [], b: [] };

            // Ambil semua data posisi bidak yang tersisa dari engine chess.js
            chess.board().forEach(row => {
                row.forEach(square => {
                    if (square && square.type !== 'k') {
                        activePieces[square.color].push(square.type);
                    }
                });
            });

            // Kalkulasi Bidak Putih yang Mati
            let deadWhite = [...INITIAL_PIECES.w];
            activePieces.w.forEach(type => {
                let idx = deadWhite.indexOf(type);
                if (idx > -1) deadWhite.splice(idx, 1);
            });

            // Kalkulasi Bidak Hitam yang Mati
            let deadBlack = [...INITIAL_PIECES.b];
            activePieces.b.forEach(type => {
                let idx = deadBlack.indexOf(type);
                if (idx > -1) deadBlack.splice(idx, 1);
            });

            // Urutkan susunan gambar dari pion hingga menteri
            const order = ['p', 'n', 'b', 'r', 'q'];
            deadWhite.sort((a,b) => order.indexOf(a) - order.indexOf(b));
            deadBlack.sort((a,b) => order.indexOf(a) - order.indexOf(b));

            // Kalkulasi Keunggulan Skor
            let whiteLossScore = deadWhite.reduce((sum, p) => sum + PIECE_VALUES[p], 0);
            let blackLossScore = deadBlack.reduce((sum, p) => sum + PIECE_VALUES[p], 0);

            let whiteAdvantage = blackLossScore - whiteLossScore;
            let blackAdvantage = whiteLossScore - blackLossScore;

            // Render ke wadah HTML
            renderDeadDOM('captured-white-box', 'w', deadWhite, blackAdvantage);
            renderDeadDOM('captured-black-box', 'b', deadBlack, whiteAdvantage);
        }

        function renderDeadDOM(boxId, color, deadArray, advantage) {
            const container = document.getElementById(boxId);
            if(!container) return;
            container.innerHTML = '';

            deadArray.forEach(type => {
                const img = document.createElement('img');
                img.className = 'dead-piece';
                img.src = `https://upload.wikimedia.org/wikipedia/commons/${getPieceImageName(color, type)}`;
                container.appendChild(img);
            });

            if (advantage > 0) {
                const badge = document.createElement('span');
                badge.className = 'score-badge';
                badge.innerText = `+${advantage}`;
                container.appendChild(badge);
            }
        }

        function handleSquareClick(squareName) {
            if (!chess || chess.turn() !== myColor || chess.game_over() || !gameStarted) return; 

            if (possibleMoves.includes(squareName)) {
                const moveData = { from: selectedSquare, to: squareName, promotion: 'q' };
                const targetPiece = chess.get(squareName);
                const move = chess.move(moveData);
                
                if (move) {
                    socket.emit('makeMove', { room: currentRoom, move: moveData, san: move.san, fen: chess.fen() });
                    playGameSound(!!targetPiece);
                    selectedSquare = null; possibleMoves = [];
                    renderBoard();
                    checkDeadPieces(); // INTEGRASI BARU: Cek sesaat setelah melangkah
                }
            } else {
                const piece = chess.get(squareName);
                if (piece && piece.color === myColor) {
                    selectedSquare = squareName;
                    const moves = chess.moves({ square: squareName, verbose: true });
                    possibleMoves = moves.map(m => m.to);
                } else {
                    selectedSquare = null; possibleMoves = [];
                }
                renderBoard();
            }
        }

        function playGameSound(isCapture) {
            try {
                if (isCapture) { soundCapture.currentTime = 0; soundCapture.play().catch(()=>{}); }
                else { soundMove.currentTime = 0; soundMove.play().catch(()=>{}); }
            } catch(e) {}
        }

        function sendMessage() {
            const input = document.getElementById('btn-input');
            const message = input.value.trim();
            if (!message) return;
            socket.emit('chatMessage', { room: currentRoom, username: myUsername, message: message });
            appendMessage({ username: myUsername, message: message }, 'me');
            input.value = '';
        }

        function appendMessage(data, type) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const div = document.createElement('div');
            div.classList.add('msg', type);
            if (type === 'system') div.innerText = data.message;
            else div.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        socket.on('initRole', (role) => {
            myColor = role; 
            appendMessage({ message: `Anda masuk sebagai tim ${role === 'w' ? 'PUTIH' : 'HITAM'}.` }, 'system');
            renderBoard();
            checkDeadPieces();
        });

        socket.on('onlineCountUpdate', (count) => {
            const el = document.getElementById('onlineCount');
            if(el) el.innerText = count;
        });

        socket.on('updatePlayers', async (players) => {
            const opponent = players.find(p => p.username !== myUsername);
            if (opponent) {
                document.getElementById('oppNameDisplay').innerText = `👤 ${opponent.username} (${opponent.color === 'w' ? 'Putih' : 'Hitam'})`;
                
                if (!gameStarted && players.length === 2) {
                    gameStarted = true;
                    document.getElementById('waitingScreen').style.display = 'none';
                    document.getElementById('gameScreen').style.display = 'flex';
                    
                    soundStart.currentTime = 0; soundStart.play().catch(()=>{});
                    
                    await initPeerConnection(); 
                    setTimeout(() => { socket.emit('voice-ready', currentRoom); }, 1000);

                    appendMessage({ message: "⚔️ Pertandingan dimulai! Saluran audio siap digunakan bersama." }, 'system');
                }
            }
        });

        socket.on('moveMade', (data) => {
            if (chess) {
                const currentPieceAtTarget = chess.get(data.move.to);
                chess.load(data.fen);
                playGameSound(!!currentPieceAtTarget);
                renderBoard();
                checkDeadPieces(); // INTEGRASI BARU: Cek setiap kali menerima data langkah lawan
            }
        });

        socket.on('chatMessage', (data) => { if (data.username !== myUsername) appendMessage(data, 'opp'); });
        socket.on('systemMessage', (message) => { appendMessage({ message: message }, 'system'); });

        socket.on('voice-ready', async () => {
            await initPeerConnection();
        });

        socket.on('voice-offer', async (data) => {
            await initPeerConnection();
            try {
                const readyState = peerConnection.signalingState;
                const collision = (isMakingOffer || readyState !== "stable");
                
                if (collision && !isPolite()) {
                    console.log("Terjadi tabrakan penawaran audio, perangkat utama mengabaikan offer lawan.");
                    return;
                }

                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('webrtc-answer', { room: currentRoom, answer: answer });
            } catch(e) { 
                console.error("Gagal saat memproses voice-offer:", e); 
            }
        });

        socket.on('voice-answer', async (data) => {
            if (peerConnection) {
                try { 
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer)); 
                } catch(e) { 
                    console.error("Gagal saat menyetel remote-answer:", e); 
                }
            }
        });

        socket.on('webrtc-candidate', async (data) => {
            if (peerConnection) {
                try { 
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); 
                } catch(e) {}
            }
        });

        socket.on('voice-disconnect', () => {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
        });
    </script>
</body>
</html>
